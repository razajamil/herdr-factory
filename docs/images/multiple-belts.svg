<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 900" role="img" aria-label="Top-down view of a factory floor with three conveyor belts running in parallel. Left: a custom belt that reads Markdown ideas and generates Jira tickets through research, propose and file-ticket stations. Middle: a work_to_pull_request belt on the Jira source running fix, review and PR stations to a merged pull request — its tickets fed by the left belt. Right: a separate custom belt reading Markdown experiments. A looping arrow shows the ticket-generator belt feeding work into the Jira belt.">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="seams" width="24" height="34" patternUnits="userSpaceOnUse">
      <rect width="24" height="34" fill="#232b3a"/>
      <line x1="0" y1="0.5" x2="24" y2="0.5" stroke="#2c3648" stroke-width="2"/>
    </pattern>
    <pattern id="hz" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#3d3527"/>
      <rect width="7" height="14" fill="#f5b83d"/>
    </pattern>
    <marker id="arrGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#f5b83d"/>
    </marker>
    <marker id="arrMuted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8fa0b8"/>
    </marker>
    <g id="crate">
      <rect width="46" height="34" rx="3" fill="#b5854a" stroke="#7a5426" stroke-width="2"/>
      <path d="M15 2 V32 M31 2 V32" stroke="#7a5426" stroke-width="1.2" opacity="0.65"/>
      <path d="M2 2 L44 32" stroke="#7a5426" stroke-width="1" opacity="0.3"/>
    </g>
    <g id="chev">
      <path d="M-9 0 l9 8 l9 -8" fill="none" stroke="#465471" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-9 11 l9 8 l9 -8" fill="none" stroke="#465471" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- backdrop -->
  <rect width="1520" height="900" rx="18" fill="#141926"/>
  <rect x="1" y="1" width="1518" height="898" rx="17" fill="none" stroke="#232b3a" stroke-width="2"/>

  <!-- title plate -->
  <rect x="500" y="24" width="520" height="54" rx="10" fill="#0e1119" stroke="#f5b83d" stroke-width="2"/>
  <circle cx="514" cy="38" r="3" fill="#39435a"/><circle cx="1006" cy="38" r="3" fill="#39435a"/>
  <circle cx="514" cy="64" r="3" fill="#39435a"/><circle cx="1006" cy="64" r="3" fill="#39435a"/>
  <text x="760" y="58" text-anchor="middle" font-size="21" font-weight="700" xml:space="preserve"><tspan fill="#f5d78a">THE FLOOR</tspan><tspan fill="#ffd97a">  ·  MULTIPLE BELTS</tspan></text>
  <text x="760" y="100" text-anchor="middle" font-size="14.5" fill="#8fa0b8">run as many belts as you like, all ticking in parallel — and one belt can feed the next</text>

  <!-- lane washes -->
  <rect x="245" y="118" width="250" height="748" rx="14" fill="#38bdf8" opacity="0.03"/>
  <rect x="660" y="118" width="260" height="748" rx="14" fill="#4ade80" opacity="0.035"/>
  <rect x="1025" y="118" width="250" height="748" rx="14" fill="#f5b83d" opacity="0.03"/>

  <!-- ══════════ belts (top-down conveyor strips) ══════════ -->
  <rect x="312" y="248" width="116" height="520" rx="4" fill="url(#seams)" stroke="#3a465e" stroke-width="2"/>
  <rect x="725" y="248" width="130" height="520" rx="4" fill="url(#seams)" stroke="#3a465e" stroke-width="2"/>
  <rect x="1092" y="248" width="116" height="520" rx="4" fill="url(#seams)" stroke="#3a465e" stroke-width="2"/>

  <!-- direction chevrons (travel = downward) -->
  <use href="#chev" x="370" y="378"/><use href="#chev" x="370" y="716"/>
  <use href="#chev" x="790" y="548"/><use href="#chev" x="790" y="716"/>
  <use href="#chev" x="1150" y="378"/>

  <!-- crates riding the belts (in the visible gaps between stations) -->
  <use href="#crate" x="347" y="540"/>
  <use href="#crate" x="767" y="385"/>
  <use href="#crate" x="1127" y="545"/>

  <!-- ══════════ LANE 1 · ideas → tickets (custom · local_markdown) ══════════ -->
  <g>
    <rect x="257" y="124" width="226" height="120" rx="10" fill="#1a212f" stroke="#3a465e" stroke-width="2"/>
    <rect x="260" y="127" width="220" height="7" rx="3.5" fill="#8fa0b8"/>
    <rect x="271" y="144" width="64" height="18" rx="4" fill="#0e1119" stroke="#f5b83d" stroke-width="1"/>
    <text x="303" y="156.5" text-anchor="middle" class="mono" font-size="9.5" fill="#ffd97a">custom</text>
    <text x="370" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#eef2f8">ideas → tickets</text>
    <rect x="298" y="200" width="144" height="20" rx="6" fill="#10151f" stroke="#8fa0b8" stroke-width="1.2"/>
    <text x="370" y="214" text-anchor="middle" class="mono" font-size="10" fill="#c4cedd">local_markdown</text>
    <text x="370" y="236" text-anchor="middle" class="mono" font-size="9.5" fill="#66738a">folder: ideas/</text>
  </g>
  <!-- station 1 · research -->
  <g>
    <rect x="257" y="260" width="226" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="260" y="263" width="220" height="7" rx="3.5" fill="#38bdf8"/>
    <circle cx="284" cy="296" r="12" fill="#0e1119" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="284" y="300.5" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">1</text>
    <text x="305" y="301" class="mono" font-size="14.5" font-weight="700" fill="#eef2f8">research</text>
    <rect x="419" y="286" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="446" y="298" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="370" y="336" text-anchor="middle" font-size="10.5" fill="#97a3b8">gathers context</text>
  </g>
  <!-- station 2 · propose -->
  <g>
    <rect x="257" y="424" width="226" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="260" y="427" width="220" height="7" rx="3.5" fill="#a78bfa"/>
    <circle cx="284" cy="460" r="12" fill="#0e1119" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="284" y="464.5" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">2</text>
    <text x="305" y="465" class="mono" font-size="14.5" font-weight="700" fill="#eef2f8">propose</text>
    <rect x="419" y="450" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="446" y="462" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="370" y="500" text-anchor="middle" font-size="10.5" fill="#97a3b8">drafts the change</text>
  </g>
  <!-- station 3 · file_ticket -->
  <g>
    <rect x="257" y="588" width="226" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="260" y="591" width="220" height="7" rx="3.5" fill="#4ade80"/>
    <circle cx="284" cy="624" r="12" fill="#0e1119" stroke="#4ade80" stroke-width="1.5"/>
    <text x="284" y="628.5" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">3</text>
    <text x="305" y="629" class="mono" font-size="14" font-weight="700" fill="#eef2f8">file_ticket</text>
    <rect x="419" y="614" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="446" y="626" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="370" y="664" text-anchor="middle" font-size="10.5" fill="#97a3b8">opens jira tickets</text>
  </g>
  <!-- lane 1 output: generated tickets -->
  <text x="370" y="794" text-anchor="middle" font-size="11" font-weight="700" fill="#f5d78a">TICKETS OUT →</text>
  <g transform="rotate(-6 352 826)">
    <rect x="320" y="810" width="64" height="30" rx="6" fill="#141c2b" stroke="#4c8dff" stroke-width="1.4"/>
    <text x="352" y="829" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#7fb0ff">PROJ-201</text>
  </g>
  <g transform="rotate(7 400 834)">
    <rect x="368" y="818" width="64" height="30" rx="6" fill="#141c2b" stroke="#4c8dff" stroke-width="1.4"/>
    <text x="400" y="837" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#7fb0ff">PROJ-202</text>
  </g>

  <!-- ══════════ LANE 2 · tickets → PRs (work_to_pull_request · jira) ══════════ -->
  <g>
    <rect x="672" y="124" width="236" height="120" rx="10" fill="#1a212f" stroke="#3a465e" stroke-width="2"/>
    <rect x="675" y="127" width="230" height="7" rx="3.5" fill="#4c8dff"/>
    <rect x="682" y="144" width="122" height="18" rx="4" fill="#0e1119" stroke="#f5b83d" stroke-width="1"/>
    <text x="743" y="156.5" text-anchor="middle" class="mono" font-size="9.5" fill="#ffd97a">work_to_pull_request</text>
    <text x="790" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#eef2f8">tickets → PRs</text>
    <rect x="742" y="200" width="96" height="20" rx="6" fill="#10151f" stroke="#4c8dff" stroke-width="1.2"/>
    <text x="790" y="214" text-anchor="middle" class="mono" font-size="10" fill="#9cc0ff">jira</text>
    <text x="790" y="236" text-anchor="middle" class="mono" font-size="9.5" fill="#66738a">board: APP · label agent</text>
  </g>
  <!-- station 1 · fix -->
  <g>
    <rect x="672" y="260" width="236" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="675" y="263" width="230" height="7" rx="3.5" fill="#f59e0b"/>
    <circle cx="699" cy="296" r="12" fill="#0e1119" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="699" y="300.5" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">1</text>
    <text x="720" y="301" class="mono" font-size="14.5" font-weight="700" fill="#eef2f8">fix</text>
    <rect x="844" y="286" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="871" y="298" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="790" y="336" text-anchor="middle" font-size="10.5" fill="#97a3b8">implements &amp; commits</text>
  </g>
  <!-- station 2 · review -->
  <g>
    <rect x="672" y="424" width="236" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="675" y="427" width="230" height="7" rx="3.5" fill="#a78bfa"/>
    <circle cx="699" cy="460" r="12" fill="#0e1119" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="699" y="464.5" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">2</text>
    <text x="720" y="465" class="mono" font-size="14.5" font-weight="700" fill="#eef2f8">review</text>
    <rect x="844" y="450" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="871" y="462" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="790" y="500" text-anchor="middle" font-size="10.5" fill="#97a3b8">read-only gate</text>
  </g>
  <!-- station 3 · pr -->
  <g>
    <rect x="672" y="588" width="236" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="675" y="591" width="230" height="7" rx="3.5" fill="#4ade80"/>
    <circle cx="699" cy="624" r="12" fill="#0e1119" stroke="#4ade80" stroke-width="1.5"/>
    <text x="699" y="628.5" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">3</text>
    <text x="720" y="629" class="mono" font-size="14.5" font-weight="700" fill="#eef2f8">pr</text>
    <rect x="844" y="614" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="871" y="626" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="790" y="664" text-anchor="middle" font-size="10.5" fill="#97a3b8">opens the PR → drives CI</text>
  </g>
  <!-- lane 2 output: merged PR -->
  <text x="790" y="792" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">MERGED</text>
  <circle cx="748" cy="826" r="14" fill="#4ade80" opacity="0.16"/>
  <circle cx="748" cy="826" r="8" fill="#4ade80"/>
  <rect x="772" y="812" width="64" height="28" rx="6" fill="#0e1119" stroke="#4ade80" stroke-width="1.4"/>
  <text x="804" y="830" text-anchor="middle" class="mono" font-size="11" fill="#4ade80">PR #42</text>
  <text x="790" y="858" text-anchor="middle" font-size="9.5" fill="#66738a">merge → teardown</text>

  <!-- ══════════ LANE 3 · experiments (custom · local_markdown) ══════════ -->
  <g>
    <rect x="1037" y="124" width="226" height="120" rx="10" fill="#1a212f" stroke="#3a465e" stroke-width="2"/>
    <rect x="1040" y="127" width="220" height="7" rx="3.5" fill="#8fa0b8"/>
    <rect x="1051" y="144" width="64" height="18" rx="4" fill="#0e1119" stroke="#f5b83d" stroke-width="1"/>
    <text x="1083" y="156.5" text-anchor="middle" class="mono" font-size="9.5" fill="#ffd97a">custom</text>
    <text x="1150" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#eef2f8">experiments</text>
    <rect x="1078" y="200" width="144" height="20" rx="6" fill="#10151f" stroke="#8fa0b8" stroke-width="1.2"/>
    <text x="1150" y="214" text-anchor="middle" class="mono" font-size="10" fill="#c4cedd">local_markdown</text>
    <text x="1150" y="236" text-anchor="middle" class="mono" font-size="9.5" fill="#66738a">folder: experiments/</text>
  </g>
  <!-- station 1 · prototype -->
  <g>
    <rect x="1037" y="260" width="226" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="1040" y="263" width="220" height="7" rx="3.5" fill="#38bdf8"/>
    <circle cx="1064" cy="296" r="12" fill="#0e1119" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="1064" y="300.5" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">1</text>
    <text x="1085" y="301" class="mono" font-size="14" font-weight="700" fill="#eef2f8">prototype</text>
    <rect x="1199" y="286" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="1226" y="298" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="1150" y="336" text-anchor="middle" font-size="10.5" fill="#97a3b8">spikes an idea</text>
  </g>
  <!-- station 2 · measure -->
  <g>
    <rect x="1037" y="424" width="226" height="100" rx="10" fill="#1e2534" stroke="#3a465e" stroke-width="2"/>
    <rect x="1040" y="427" width="220" height="7" rx="3.5" fill="#a78bfa"/>
    <circle cx="1064" cy="460" r="12" fill="#0e1119" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1064" y="464.5" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">2</text>
    <text x="1085" y="465" class="mono" font-size="14" font-weight="700" fill="#eef2f8">measure</text>
    <rect x="1199" y="450" width="54" height="16" rx="8" fill="#0e1119" stroke="#d97757" stroke-width="1"/>
    <text x="1226" y="462" text-anchor="middle" font-size="9" fill="#e08a68">✳ agent</text>
    <text x="1150" y="500" text-anchor="middle" font-size="10.5" fill="#97a3b8">captures results</text>
  </g>
  <text x="1150" y="600" text-anchor="middle" font-size="22" font-weight="700" fill="#55627a">⋯</text>
  <text x="1150" y="624" text-anchor="middle" font-size="9.5" fill="#66738a">any steps you define</text>
  <!-- lane 3 output -->
  <text x="1150" y="792" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">DONE</text>
  <circle cx="1150" cy="826" r="14" fill="#4ade80" opacity="0.16"/>
  <circle cx="1150" cy="826" r="8" fill="#4ade80"/>
  <text x="1150" y="858" text-anchor="middle" font-size="9.5" fill="#66738a">no PR · results kept · teardown</text>

  <!-- ══════════ feed loop: lane 1 generates work for lane 2 ══════════ -->
  <path d="M 404 820 C 545 842, 580 812, 580 720 L 580 300 C 580 240, 606 190, 668 185"
        fill="none" stroke="#f5b83d" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#arrGold)"/>
  <rect x="512" y="486" width="136" height="40" rx="8" fill="#0e1119" stroke="#f5b83d" stroke-width="1.6"/>
  <text x="580" y="504" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffd97a">generates work</text>
  <text x="580" y="518" text-anchor="middle" class="mono" font-size="9.5" fill="#b9c4d4">the jira belt claims it</text>

  <!-- floor caption -->
  <text x="760" y="884" text-anchor="middle" font-size="12.5" fill="#66738a">one repo · many belts ticking in parallel · same or different sources · one belt's output can be another's input</text>
</svg>
