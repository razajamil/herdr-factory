# herdr-factory per-repo config.
# Copy this folder to ~/.config/herdr-factory/repos/<name>/ (<name> = what you pass to --repo),
# edit config.yml, and put any repo-specific brief text in guidelines-prompt.md (optional).
# Read with `yq`. Anything omitted falls back to the engine defaults.

repo:
  path: $HOME/dev/my-repo        # MAIN (non-linked) checkout
  base_ref: origin/main          # branch worktrees fork from
  # github: owner/name           # default: derived from the origin remote

# Branch name for each cat (the worktree + workspace derive from it). Must include
# {{ticket_id}}. Vars: {{ticket_id}} {{ticket_short_slug}} (<=20) {{ticket_slug}}
# (<=50) {{ticket_type}} {{ticket_prefix}} (fix|chore|feature, by issue type).
# Default when unset: {{ticket_prefix}}/{{ticket_id}}-{{ticket_slug}}.
workspace_name: "{{ticket_prefix}}/{{ticket_id}}-{{ticket_short_slug}}"

# Where this repo polls work from. Per-repo, so different repos can target different
# Atlassian sites / projects / boards. base_url is the Atlassian site (not a secret);
# the Jira auth (email + token) stays in the shared ~/.config/herdr-factory/env.
jira:
  base_url: https://your-org.atlassian.net
  project: PROJ
  board: 123
  label: agent
  status:
    todo: To Do
    in_development: In Progress
    review: In Review

# The three pipeline agents — fix → review → pr. All required, no defaults. Each runs in
# its own herdr layout pane (tab/pane). Each agent must, when done, write its handoff note
# and run `herdr-factory --repo <name> step-done <KEY> <step>`.
#
# prompt_type is REQUIRED for every agent (there is no silent default):
#   augment — the engine ships a sensible built-in prompt for the step and appends your
#             prompt_file (OPTIONAL here) as extra, repo-specific instructions. Recommended
#             while you're getting a feel for how the agents behave.
#   replace — your prompt_file (REQUIRED here) is sent to the agent verbatim, so you own the
#             whole prompt. Switch to this once you know the system and want full control.
# prompt_file paths are relative to this folder; tokens like @@KEY@@ / @@HANDOFF_IN@@ /
# @@STEP_DONE_CMD@@ are substituted in both the built-in prompt and your additions.
agents:
  fix:
    tab: fix
    pane: agent
    prompt_type: augment
    prompt_file: fix.md          # extra fix-step notes, appended to the built-in fix prompt
  review:
    tab: review
    pane: agent
    prompt_type: augment
    prompt_file: review.md       # extra review-step notes
  pr:
    tab: pr
    pane: agent
    prompt_type: augment
    prompt_file: pr.md           # extra pr-step notes
  # guidelines-prompt.md in this folder (if present) is appended to every agent prompt.

limits:
  max_active: 3
  watch_hours: 7
  develop_budget_seconds: 5400   # fix step budget (a still-committing agent is extended)
  stall_seconds: 2700            # no new commits for this long → stalled → attention (even if "working")
  review_budget_seconds: 1800    # review step budget
  pr_budget_seconds: 3600        # pr step budget (open PR + CI/bot round)
  tick_interval_seconds: 60
