# herdr-cats per-repo config.
# Copy this folder to ~/.config/herdr-cats/repos/<name>/ (<name> = what you pass to --repo),
# edit config.yml, and put any repo-specific brief text in guidelines-prompt.md (optional).
# Read with `yq`. Anything omitted falls back to the engine defaults.

repo:
  path: $HOME/dev/my-repo        # MAIN (non-linked) checkout
  base_ref: origin/main          # branch worktrees fork from
  # github: owner/name           # default: derived from the origin remote

# Branch name for each cat (the worktree + workspace derive from it). Must include
# {{ticket_id}}. Vars: {{ticket_id}} {{ticket_short_slug}} (<=20) {{ticket_slug}}
# (<=50) {{ticket_type}} {{ticket_prefix}} (fix|chore|feature, by issue type).
# Default when unset: {{ticket_prefix}}/{{ticket_id}}-{{ticket_slug}}.
workspace_name: "{{ticket_prefix}}/{{ticket_id}}-{{ticket_short_slug}}"

jira:
  project: PROJ
  board: 123
  label: agent
  status:
    todo: To Do
    in_development: In Progress
    review: In Review

worker:
  # All optional — generic wording is used when unset.
  bootstrap_cmd: npm ci          # how to install/setup the worktree
  deslop_cmd: ""                 # a quality/de-slop slash command, e.g. /my-cleanup
  resolve_cmd: ""                # a PR-comment resolution workflow, e.g. /my-pr-resolver
  main_tab: main                 # herdr fix-layout tab the worker is dispatched into
  agent_pane: agent              # pane within that tab where the idle claude waits
  # guidelines-prompt.md in this folder (if present) is appended to every brief.

limits:
  max_active: 3
  watch_hours: 7
  develop_budget_seconds: 5400
  tick_interval_seconds: 180
