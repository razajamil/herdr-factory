# yaml-language-server: $schema=../../config.schema.json
# herdr-factory per-repo config.
# Copy this folder to ~/.config/herdr-factory/repos/<name>/ (<name> = what you pass to --repo),
# edit config.yml, and put any repo-specific brief text in guidelines-prompt.md (optional).
# Anything omitted falls back to the engine defaults.

repo:
  path: $HOME/dev/my-repo # MAIN (non-linked) checkout. ~ and $HOME are expanded.
  base_ref: origin/main # branch worktrees fork from
  # github: owner/name           # default: derived from the origin remote

# Repo-global limits (shared across every belt below).
limits:
  max_active_workspaces: 3 # cap on concurrently WORKED workspaces (one worktree per run), across ALL belts; parked + idle-watching runs hold no slot
  stall_seconds: 2700 # no new commits for this long → stalled → attention (heartbeat steps only)
  max_bounces: 3 # times a run may be bounced back to an earlier step (evidence/review → work) before → attention
  # Per-step budgets are a property of the step primitive now (work 5400 · evidence 2400 · review 1800 ·
  # pr 3600); override per step with `budget_seconds`. step_budget_seconds is the fallback for a
  # `custom` step that sets none.
  step_budget_seconds: 3600
  tick_interval_seconds: 60

# ── Work sources: WHERE work is pulled from. Backends only — no pipeline here. ─────────────────
# Each has a `type` (jira | local_markdown | github_issues | sentry), an optional `name` (default =
# type, unique per repo), and a type-specific block. Belts reference a source by this name.
work_sources:
  - type: jira
    name: jira
    jira:
      base_url: https://your-org.atlassian.net # the Atlassian site (auth — email+token — lives in this repo's env file)
      project: PROJ
      board: "123"
      # NOTE: the pickup label is per-BELT now (belt.label below), not here — so one board can feed
      # several belts, each claiming a different label.
      status:
        todo: To Do
        in_development: In Progress
        review: In Review
        # done: Done   # OPT-IN: uncomment to move the ticket here when the PR merges (after the merge,
        #              # before the worktree is recycled). Omit to leave terminal closure to Jira's
        #              # GitHub integration; a closed/abandoned run never touches the ticket either way.

  - type: local_markdown
    name: ideas
    local_markdown:
      folder: $HOME/dev/my-repo-work-items # a folder of *.md task briefs; ~ and $HOME expand

  # A GitHub Issues work source: an issue carrying a belt's pickup label (belt.label) is eligible;
  # that label is the "trigger" — consumed at claim, re-add it to retry a failed run. GitHub is the
  # status of record (labels + open/closed); auth is the gh CLI's token unless GITHUB_TOKEN is set
  # in this repo's env file. Every field below is optional — `github_issues: {}` works.
  # - type: github_issues
  #   name: gh-issues
  #   github_issues:
  #     # repo: owner/name                # default: the repo PRs are opened against
  #     # (the trigger label is the belt's `label` — set it on the belt, not here)
  #     # state_labels:                   # lifecycle projection on the issue (created on demand)
  #     #   in_development: herdr:in-development
  #     #   in_review: herdr:in-review
  #     #   aborted: herdr:aborted
  #     # close_on: { merged: true, done: true, aborted: false } # close as completed on success (a
  #     #   backstop over the PR's `Fixes #n` auto-close); aborted stays OPEN unless true (→ not_planned)
  #     # type_labels: { bug: Bug, enhancement: Feature } # issue label → work type (native issue type wins)
  #     # default_type: Feature
  #     # max_pages: 1                    # pages of 100 open issues per poll

# ── Belts: WHAT we do with the work. A belt pairs a source with an ordered pipeline. ───────────
# At claim time belts are walked in `priority` order (lower first); the FIRST belt whose optional
# `match` predicate accepts an item claims it (first match wins). `match` is a path (relative to
# this folder) to a .ts module whose default export is `(ctx) => boolean` — ctx = { item, source }.
# Each belt owns its own `workspace_name` branch template (the worktree name reflects the belt).
# `label` is the belt's pickup label — the tag the factory looks for to claim work. REQUIRED for a
# belt on a label-driven source (jira / github_issues); there is NO default. A source with no label
# concept (local_markdown) takes none. Two belts on one source must use DISTINCT labels (splitting
# its work); the same source+label in two belts is rejected (they'd contend for the same items).
belt:
  # ── A belt is one ordered `steps[]` list. Each step references a registered step PRIMITIVE by
  # `type` (work · evidence · review · pr · custom); lifecycle is DERIVED from what the steps produce
  # — a `pr` step produces a pull_request, which gives the belt the "walk away" PR watch (ride CI +
  # review to merge, then tear the worktree down). `work` implements + commits; `evidence` captures
  # visual proof (dev server + playwright) and can bounce back to `work` if the fix isn't proven;
  # `review` is a strict read-only gate that passes or bounces back to `work`; `pr` opens the PR
  # (embedding the evidence URLs) + rides CI. Set a step's `tab`+`pane` together to target a pane a
  # `layouts` entry builds (see below) — the belt's `default_layout` is built into each worktree on
  # claim, so those panes come up automatically; omit both to have herdr-factory spawn a dedicated pane — except
  # `evidence`, which runs ONLY when a tab+pane targets an agent your layout provides (drop it — or
  # its tab/pane — and the belt is work → review → pr). A step may OPTIONALLY add a `prompt_file`
  # (+ optional `prompt_file_source`, default `config` = this folder; set `repo` to read it from the
  # target repo checkout — the worktree — at run time) that AUGMENTS its engine prompt — e.g.
  # `{ type: work, tab: work, pane: agent, prompt_file: .herdr/work-notes.md, prompt_file_source: repo }`.
  - name: ship_bugs
    source: jira
    label: agent # pickup label — REQUIRED (no default); tickets carrying it are eligible for this belt
    priority: 1
    # active: true # set false to temporarily PAUSE this belt: it takes on no new work, but any of its
    #              # in-flight runs still progress to completion — a delete-free way to disable a belt
    match: match-bugs.ts # optional; omit ⇒ this belt accepts anything from `jira` carrying `label`
    workspace_name: "{{semantic_work_prefix}}/{{work_id}}-{{work_slug}}"
    default_layout: bug-dev # the layout (see `layouts:` below) the factory builds into every worktree this belt claims
    # layout_matching:                                  # optional: pick a different layout per branch — first glob that matches the branch wins
    #   - { worktree_pattern: "hotfix/*", layout: bug-dev }
    # pr:                                               # OPTIONAL belt-level PR behavior — applied by the `pr` step when it opens the PR
    #   draft: true                                     #   open as a draft PR
    #   title: "[{{semantic_work_prefix}}] {{work_id}} {{work_slug}}" # same vars as workspace_name (rendered verbatim)
    #   labels: [needs-review]                          #   applied via `gh` at creation (created on demand)
    #   reviewers: [octocat]                            #   requested reviewers  ·  assignees: [me]
    #   automated_round_minutes: 10                     #   CI/bot polling window the pr step runs; 0 = skip the round entirely
    steps:
      - { type: work, tab: work, pane: agent }
      - { type: evidence, tab: evidence, pane: agent } # opt-in; drop tab/pane (or the whole entry) to SKIP evidence
      - { type: review, tab: review, pane: agent }
      - { type: pr, tab: pr, pane: agent }

  # ── A fully user-defined, agent-driven flow: `custom` steps whose `prompt_file` is the whole step
  # body (the engine adds only a handover scaffold naming the belt + sibling steps). `prompt_file` is
  # REQUIRED for a `custom` step (it has no built-in prompt); `prompt_file_source` is optional and
  # defaults to `config` (this folder — set `repo` to read from the target checkout instead). No `pr`
  # step ⇒ no PR / no review watch — the run ends when the LAST step signals step-done.
  # budget_seconds/heartbeat are optional per step (heartbeat off by default — these steps make no commits).
  - name: work_generation
    source: ideas
    priority: 2
    workspace_name: "research/{{work_id}}-{{work_slug}}"
    steps:
      # prompt_file_source defaults to `config` (this folder), so these steps just name a prompt_file;
      # add `prompt_file_source: repo` only to read a prompt from the target checkout instead.
      - { type: custom, name: research, tab: research, pane: agent, prompt_file: prompts/work_generation/research.md }
      - { type: custom, name: propose, prompt_file: prompts/work_generation/propose.md }
      - { type: custom, name: create_jira_ticket, prompt_file: prompts/work_generation/create-jira-ticket.md }

# ── Layouts: herdr tab/pane arrangements the factory BUILDS into each worktree on claim (absorbed
# from the workspace-manager plugin). A belt picks one via `default_layout` (or, per branch,
# `layout_matching`) above. Building the layout is what brings up the panes a step's `tab`/`pane`
# targets, so you no longer hand-build a herdr layout per worktree. Each pane's `command` runs once
# the pane is up (a step's target pane runs an interactive agent — e.g. `command: claude` — that the
# step then delivers its prompt to). `split` is vertical|right / horizontal|down; a pane's `size` is
# a "30%" percentage, a 0<n<1 fraction, or an integer count of cells. At most ONE pane may be
# `setup: true`: the layout-level `setup.command` runs there first, and `blocking: true` makes the
# builder wait for it to finish before spawning any later tab. OPTIONAL — omit `layouts` (and a
# belt's default_layout/layout_matching) and the factory builds nothing.
layouts:
  - id: bug-dev
    setup: { command: mise run setup, blocking: true } # runs once in the setup pane before the rest of the layout
    tabs:
      - title: work # ← the `work` step targets tab: work / pane: agent
        panes:
          - { title: agent, command: claude, setup: true } # the agent the work step delivers its prompt to; also runs setup
          - { title: server, command: mise run dev, split: right, size: "40%" } # dev server alongside, 40% wide
      - title: evidence # ← the `evidence` step targets tab: evidence / pane: agent
        panes:
          - { title: agent, command: claude }
      - title: review # ← the `review` step
        panes:
          - { title: agent, command: claude }
      - title: pr # ← the `pr` step
        panes:
          - { title: agent, command: claude }

# ── evidence: where the evidence step publishes captured screenshots/video. ──
# OPTIONAL — omit it and the evidence step still captures + assesses (and can bounce), it just
# publishes nothing. The backend is a SEAM selected by `publisher` (default `s3`; a block with no
# `publisher:` key is `s3`, unchanged). Every publisher lays evidence under the same key layout
# `herdr-factory/<github_username>/<key_prefix>/<key>/<run>-<timestamp>/` and builds "prefix +
# filename" URLs. `key_prefix` + `github_username` (default = the gh login) are shared by all three.
#
# s3 — S3 + CloudFront. Non-secret infra pointers ONLY: AWS credentials come from the ambient AWS
# credential chain (~/.aws / AWS_* env / the named `profile`), never stored here or handed to an
# agent. bucket + region + cloudfront_domain are required together.
# evidence:
#   bucket: my-evidence-bucket
#   region: us-east-1
#   cloudfront_domain: d123abc.cloudfront.net   # bare host (or a full URL); builds https asset URLs
#   key_prefix: herdr-factory                   # optional key prefix
#   profile: my-aws-profile                     # optional AWS CLI named profile
#
# local — zero cloud setup: copy captures into a dir the resident server serves at /evidence/<key>/…;
# URLs point at that server (it must be running to resolve them). Same-machine/tailnet reviewers.
# evidence:
#   publisher: local
#   public_base_url: http://my-box.tailnet.ts.net:8765   # optional; default http://127.0.0.1:<port>
#
# command — bring-your-own backend: the executable is run with (captureDir, keyPrefix) and must
# upload the bytes + print one public URL per file to stdout. Non-zero exit / timeout is retried.
# evidence:
#   publisher: command
#   command: ./publish-evidence.sh              # a bare path, or an argv array [tool, --flag, …]
#   timeout_seconds: 300                         # optional; default 300

# ── branch: how a work-item type maps to {{semantic_work_prefix}}, and the length caps for the slug
# vars. OPTIONAL and repo-wide (override per belt with a belt-level `branch:` block — each field
# resolves belt over repo over the defaults). OMIT it and branch names are unchanged: the historical
# bug|defect → fix, chore|task → chore, else feature taxonomy + {{work_slug}} ≤20 / {{work_full_slug}}
# ≤50. A work TYPE matches a `prefixes` key case-insensitively by SUBSTRING (so "Dev bug" → the "bug"
# rule); a reserved `default` key is the fallback for an unmatched type (omit it ⇒ "feature").
# branch:
#   prefixes:
#     story: feat                               # story-typed items → feat/… branches
#     bug: fix
#     default: chore                            # any unmapped type
#   slug_max: 20                                # cap for {{work_slug}}
#   full_slug_max: 50                           # cap for {{work_full_slug}}

# ── agent: the harness a factory-SPAWNED pane launches — the binary + its flags. OPTIONAL and
# repo-wide (override per belt with a belt-level `agent:` block, or per step with `agent:` on a step
# ref). OMIT it and spawned panes launch `claude --dangerously-skip-permissions`, unchanged — this is
# how you change the agent CLI or its permission posture WITHOUT editing the checkout (see the
# README's Security note). Resolution is whole-block, most-specific-wins (step over belt over repo):
# because flags are command-specific, `command` defaults to `claude` and `flags` to EMPTY once you set
# a block — list what you want. `command` must be a herdr-recognized agent (claude/opencode/codex/pi/…
# — whatever `herdr integration install` supports) so herdr detects its idle/working state. Panes YOUR
# layout provides are unaffected (set the agent there via the pane's `command:`).
# agent:
#   command: opencode                           # the spawned pane's executable (default: claude)
#   flags: [--some-flag]                        # its flags (default: none once an `agent:` block is set)

# guidelines-prompt.md in this folder (if present) is appended to EVERY step prompt of EVERY belt.
