# yaml-language-server: $schema=../../config.schema.json
# herdr-factory per-repo config.
# Copy this folder to ~/.config/herdr-factory/repos/<name>/ (<name> = what you pass to --repo),
# edit config.yml, and put any repo-specific brief text in guidelines-prompt.md (optional).
# Anything omitted falls back to the engine defaults.

repo:
  path: $HOME/dev/my-repo # MAIN (non-linked) checkout. ~ and $HOME are expanded.
  base_ref: origin/main # branch worktrees fork from
  # github: owner/name           # default: derived from the origin remote

# Repo-global limits (shared across every belt below).
limits:
  max_active_workspaces: 3 # cap on concurrently WORKED workspaces (one worktree per run), across ALL belts; parked + idle-watching runs hold no slot
  develop_budget_seconds: 5400 # work_to_pull_request fix-step budget
  stall_seconds: 2700 # no new commits for this long → stalled → attention
  review_budget_seconds: 1800 # work_to_pull_request review-step budget
  evidence_budget_seconds: 2400 # work_to_pull_request evidence-step budget (capture + video + upload)
  pr_budget_seconds: 3600 # work_to_pull_request pr-step budget (open PR + CI/bot round)
  max_bounces: 3 # times a run may be bounced back to a step (evidence/review → fix) before → attention
  step_budget_seconds: 3600 # default budget for a custom belt step (override per-step)
  tick_interval_seconds: 60

# ── Work sources: WHERE work is pulled from. Backends only — no pipeline here. ─────────────────
# Each has a `type` (jira | local_markdown | github_issues), an optional `name` (default = type,
# unique per repo), and a type-specific block. Belts reference a source by this name.
work_sources:
  - type: jira
    name: jira
    jira:
      base_url: https://your-org.atlassian.net # the Atlassian site (auth — email+token — lives in this repo's env file)
      project: PROJ
      board: "123"
      # NOTE: the pickup label is per-BELT now (belt.label below), not here — so one board can feed
      # several belts, each claiming a different label.
      status:
        todo: To Do
        in_development: In Progress
        review: In Review

  - type: local_markdown
    name: ideas
    local_markdown:
      folder: $HOME/dev/my-repo-work-items # a folder of *.md task briefs; ~ and $HOME expand

  # A GitHub Issues work source: an issue carrying a belt's pickup label (belt.label) is eligible;
  # that label is the "trigger" — consumed at claim, re-add it to retry a failed run. GitHub is the
  # status of record (labels + open/closed); auth is the gh CLI's token unless GITHUB_TOKEN is set
  # in this repo's env file. Every field below is optional — `github_issues: {}` works.
  # - type: github_issues
  #   name: gh-issues
  #   github_issues:
  #     # repo: owner/name                # default: the repo PRs are opened against
  #     # (the trigger label is the belt's `label` — set it on the belt, not here)
  #     # state_labels:                   # lifecycle projection on the issue (created on demand)
  #     #   in_development: herdr:in-development
  #     #   in_review: herdr:in-review
  #     #   aborted: herdr:aborted
  #     # close_on: { merged: true, done: true, aborted: false } # close as completed on success (a
  #     #   backstop over the PR's `Fixes #n` auto-close); aborted stays OPEN unless true (→ not_planned)
  #     # type_labels: { bug: Bug, enhancement: Feature } # issue label → work type (native issue type wins)
  #     # default_type: Feature
  #     # max_pages: 1                    # pages of 100 open issues per poll

# ── Belts: WHAT we do with the work. A belt pairs a source with an ordered pipeline. ───────────
# At claim time belts are walked in `priority` order (lower first); the FIRST belt whose optional
# `match` predicate accepts an item claims it (first match wins). `match` is a path (relative to
# this folder) to a .ts module whose default export is `(ctx) => boolean` — ctx = { item, source }.
# Each belt owns its own `workspace_name` branch template (the worktree name reflects the belt).
# `label` is the belt's pickup label — the tag the factory looks for to claim work. REQUIRED for a
# belt on a label-driven source (jira / github_issues); there is NO default. A source with no label
# concept (local_markdown) takes none. Two belts on one source must use DISTINCT labels (splitting
# its work); the same source+label in two belts is rejected (they'd contend for the same items).
belt:
  # ── work_to_pull_request: the fix → evidence → review → pr flow with the "walk away" PR watch. ──
  # The engine owns the steps + their prompts and rides the PR through CI/review to merge, then tears
  # the worktree down. fix implements; evidence captures visual proof (dev server + playwright) and
  # can bounce back to fix if the fix isn't proven; review is a strict read-only gate that passes or
  # bounces back to fix; pr opens the PR (embedding the evidence URLs) + rides CI. An
  # `agents.{fix,evidence,review,pr}` block picks each step's layout pane (set tab+pane together for a
  # layout your herdr setup provisions; omit both to have herdr-factory spawn a dedicated pane —
  # except `evidence`, which runs ONLY when a tab+pane targets an agent your layout provides; with
  # no tab/pane the evidence step is skipped entirely and the belt is fix → review → pr).
  # Each agent may OPTIONALLY add a `prompt_file` (+ a required
  # `prompt_file_source`: `config` = this folder, `repo` = the target repo checkout, read from the
  # worktree at run time) that AUGMENTS that step's engine prompt with repo-specific instructions —
  # e.g. `fix: { tab: fix, pane: agent, prompt_file: .herdr/fix-notes.md, prompt_file_source: repo }`.
  - name: ship_bugs
    belt_type: work_to_pull_request
    source: jira
    label: agent # pickup label — REQUIRED (no default); tickets carrying it are eligible for this belt
    priority: 1
    match: match-bugs.ts # optional; omit ⇒ this belt accepts anything from `jira` carrying `label`
    workspace_name: "{{semantic_work_prefix}}/{{work_id}}-{{work_slug}}"
    agents:
      fix: { tab: fix, pane: agent }
      evidence: { tab: evidence, pane: agent } # opt-in; omit tab/pane to SKIP the evidence step
      review: { tab: review, pane: agent }
      pr: { tab: pr, pane: agent }

  # ── custom: a fully user-defined, agent-driven flow. Each step's prompt_file is the whole step
  # body (the engine adds only a handover scaffold naming the belt + sibling steps); prompt_file +
  # prompt_file_source (`config` = this folder, `repo` = the target repo checkout) are REQUIRED. The
  # run ends when the LAST step signals step-done — no PR, no review watch. budget_seconds/heartbeat
  # are optional per step (heartbeat off by default — these steps make no commits).
  - name: work_generation
    belt_type: custom
    source: ideas
    priority: 2
    workspace_name: "research/{{work_id}}-{{work_slug}}"
    steps:
      - {
          name: research,
          tab: research,
          pane: agent,
          prompt_file: prompts/work_generation/research.md,
          prompt_file_source: config,
        }
      - {
          name: propose,
          prompt_file: prompts/work_generation/propose.md,
          prompt_file_source: config,
        }
      - {
          name: create_jira_ticket,
          prompt_file: prompts/work_generation/create-jira-ticket.md,
          prompt_file_source: config,
        }

# ── evidence: where the evidence step publishes captured screenshots/video (S3 + CloudFront). ──
# OPTIONAL — omit it and the evidence step still captures + assesses (and can bounce), it just
# publishes nothing. Non-secret infra pointers ONLY: AWS credentials come from the ambient AWS CLI
# credential chain (~/.aws / AWS_* env / the named `profile`), never stored here or handed to an
# agent. bucket + region + cloudfront_domain are required together.
# evidence:
#   bucket: my-evidence-bucket
#   region: us-east-1
#   cloudfront_domain: d123abc.cloudfront.net   # bare host (or a full URL); builds https asset URLs
#   key_prefix: herdr-factory                   # optional S3 key prefix
#   profile: my-aws-profile                     # optional AWS CLI named profile

# guidelines-prompt.md in this folder (if present) is appended to EVERY step prompt of EVERY belt.
